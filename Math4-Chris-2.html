            <div className={`flex flex-col ${printMode === 'exam' ? 'gap-6 print:gap-4' : 'gap-10 print:gap-10'}`}>
              {Object.entries(groupedQuestions).map(([groupName, groupQs], groupIndex) => (
                <div key={groupName} className={`flex flex-col ${printMode === 'exam' ? 'gap-4 print:gap-2' : 'gap-8 print:gap-8'} ${groupIndex > 0 && printMode !== 'exam' ? 'print:break-before-page' : ''}`}>
                  
                  {groupQs.map((q, index) => {
                    const isFirst = index === 0;
                    
                    // 單一題目的內容區塊
                    const questionContent = (
                      <div key={`${q.source}-${q.page}-${q.id}`} className={`flex flex-row border-b border-gray-300 ${printMode === 'exam' ? 'pb-4 print:pb-3' : 'pb-8 print:pb-8'} ${!isFirst ? 'print:break-inside-avoid' : ''}`}>
                        
                        {/* 左側：題目區 */}
                        <div className="w-1/2 pr-6 border-r-2 border-dashed border-gray-300">
                          <div className="flex gap-2">
                            <span className="font-bold text-xl text-indigo-800 shrink-0">
                              P{q.page}-{q.id}.
                            </span>
                            {q.question && (
                              <div className="text-lg font-medium leading-relaxed text-gray-800 whitespace-pre-wrap">
                                {q.question}
                              </div>
                            )}
                          </div>
                          
                          {/* 支援單圖或多圖顯示 (加入 onError 處理本機圖片載入失敗的情況) */}
                          {q.imageUrl && (
                            <div className={`${printMode === 'exam' ? 'mt-2 mb-1 print:mt-1' : 'mt-4 mb-2'} pl-6 flex flex-col gap-2`}>
                              {(Array.isArray(q.imageUrl) ? q.imageUrl : [q.imageUrl]).map((img, idx) => (
                                <img 
                                  key={idx} 
                                  src={img} 
                                  alt="題目附圖" 
                                  className="max-w-full w-[95%] h-auto rounded border border-gray-200 shadow-sm print:shadow-none print:border-gray-400" 
                                  onError={(e) => { 
                                    if (e.target.dataset.errorHandled) return;
                                    e.target.dataset.errorHandled = true;
                                    e.target.src = 'https://placehold.co/400x200?text=' + encodeURIComponent('圖片待載入'); 
                                  }}
                                />
                              ))}
                            </div>
                          )}

                          {q.options && q.options.length > 0 && (
                            <div className={`${printMode === 'exam' ? 'mt-2 print:mt-1' : 'mt-4'} pl-6 flex flex-col ${printMode === 'exam' ? 'gap-1 print:gap-0' : 'gap-2'} text-lg`}>
                              {q.options.map((opt, idx) => (
                                <div key={idx} className="text-gray-700">{opt}</div>
                              ))}
                            </div>
                          )}
                        </div>

                        {/* 右側：解析區 */}
                        <div className="w-1/2 pl-6 relative">
                          {/* 考卷模式下將原 h-full 加上 print:hidden，徹底釋放高度，讓左側題目決定此題行高 */}
                          <div className={`h-full ${printMode === 'exam' ? 'print:hidden' : ''}`}>
                            <div className="flex items-center gap-2 mb-4 text-blue-800">
                              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                              <span className="font-bold text-xl md:text-2xl">深度解析</span>
                              <span className="ml-auto bg-red-100 text-red-700 px-4 py-1.5 rounded-full text-base md:text-lg font-bold shadow-sm">
                                解答：{q.correctAnswer}
                              </span>
                            </div>
                            
                            <div className="bg-blue-50/50 p-5 rounded-lg border border-blue-100">
                              <h4 className="font-bold text-[#FF0000] text-lg md:text-xl mb-3">{q.explanation.title}</h4>
                              
                              {/* 解析附圖顯示區域 */}
                              {q.explanation.imageUrl && (
                                <div className="mb-4 pl-4 border-l-4 border-amber-300">
                                  <img 
                                    src={q.explanation.imageUrl} 
                                    alt="解析附圖" 
                                    className="max-w-full w-[95%] md:w-[80%] h-auto rounded shadow-sm border border-blue-200 print:shadow-none print:border-gray-400"
                                    onError={(e) => { 
                                      if (e.target.dataset.errorHandled) return;
                                      e.target.dataset.errorHandled = true;
                                      e.target.src = 'https://placehold.co/300x150?text=' + encodeURIComponent('解析圖片待載入'); 
                                    }}
                                  />
                                </div>
                              )}

                              <p className="text-gray-800 mb-5 leading-relaxed text-base md:text-lg bg-yellow-100/60 p-4 rounded-md whitespace-pre-wrap">
                                <span className="font-semibold text-amber-700">💡 核心觀念：</span>
                                {q.explanation.coreConcept}
                              </p>
                              
                              <ul className="space-y-4">
                                {q.explanation.details.map((detail, idx) => (
                                  <li key={idx} className="text-base md:text-lg leading-relaxed whitespace-pre-wrap">
                                    <span className={`font-semibold mr-2 ${q.correctAnswer !== "見解析" && detail.opt.includes(q.correctAnswer.substring(0,2)) ? 'text-green-700' : 'text-gray-800'}`}>
                                      {detail.opt}
                                    </span>
                                    <span className="text-gray-700">
                                      {detail.desc}
                                    </span>
                                  </li>
                                ))}
                              </ul>
                            </div>
                          </div>
                          
                        </div>

                      </div>
                    );

                    // 若是該出處的第一題，將「出處標籤」與「第一題內容」打包成一個不可分割的區塊 (break-inside-avoid)
                    if (isFirst) {
                      // 由於已經統一只剩下一個標籤，預設使用藍色系
                      let tagBgClass = 'bg-[#0000ff]';
                      let tagTextClassPrint = 'print:text-[#0000ff]';
                      let tagBorderClassPrint = 'print:border-[#0000ff]';

                      return (
                        <div key={`wrapper-${groupName}`} className="print:break-inside-avoid flex flex-col">
                          {/* 出處標題標籤 */}
                          <div className={`flex items-center border-b-2 border-gray-400 pb-2 ${printMode === 'exam' ? 'mb-2 print:mb-1' : 'mb-4'} print:border-gray-800`}>
                            <span className={`${tagBgClass} text-white px-4 py-1.5 text-md font-bold rounded-t-lg tracking-widest print:bg-white ${tagTextClassPrint} print:border-2 ${tagBorderClassPrint} print:rounded-md print:px-3`}>
                              📂 出處：{groupName}
                            </span>
                          </div>
                          {questionContent}
                        </div>
                      );
                    }

                    // 不是第一題，就直接輸出內容
                    return questionContent;
                  })}
                </div>
              ))}
            </div>

            {/* 頁尾 */}
            <div className="mt-8 text-center text-gray-400 text-sm print:block">
              - 努力學習，必有收穫 -
            </div>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MistakeNotebook />);
  </script>
</body>
</html>
