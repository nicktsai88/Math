    const MathText = ({ content, className = "" }) => {
      const createMarkup = (str) => {
        if (typeof str !== 'string') return { __html: '' };
        // 透過正規表達式捕捉被 $ 符號包圍的數學公式
        const parts = str.split(/(\$.*?\$)/g);
        const html = parts.map(part => {
          if (part.startsWith('$') && part.endsWith('$')) {
            const math = part.slice(1, -1);
            try {
              // 呼叫 KaTeX 渲染數學公式
              return katex.renderToString(math, { throwOnError: false });
            } catch (e) {
              return part; // 若解析失敗則回退為原始字串
            }
          }
          // 將一般文字的特殊字元跳脫，避免 HTML 跑版
          return part.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }).join('');
        return { __html: html };
      };
      return <span className={className} dangerouslySetInnerHTML={createMarkup(content)} />;
    };

                      // 判斷選項長度來決定排版欄位數 (智慧橫式排版)
                      const maxOptLen = q.options.length > 0 ? Math.max(...q.options.map(o => o.length)) : 0;
                      let gridColsClass = 'grid-cols-1';
                      if (q.options.length > 4) {
                        gridColsClass = 'grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 print:grid-cols-4'; 
                      } else if (q.options.length > 0) {
                        if (maxOptLen <= 15) {
                          gridColsClass = 'grid-cols-2 lg:grid-cols-4 print:grid-cols-4'; 
                        } else if (maxOptLen <= 30) {
                          gridColsClass = 'grid-cols-1 lg:grid-cols-2 print:grid-cols-2'; 
                        } else {
                          gridColsClass = 'grid-cols-1'; 
                        }
                      }

                      // 單一題目的內容區塊
                      const questionContent = (
                        <div key={`${q.type}-${q.id}`} className={`flex flex-row border-b border-gray-300 ${printMode === 'exam' ? 'pb-4 print:pb-3' : 'pb-8 print:pb-8'} ${!isFirst && q.type !== 'calc' ? 'print:break-inside-avoid' : ''}`}>
                          
                          {/* 左側：題目區 */}
                          <div className={`w-[60%] print:w-[65%] pr-6 border-r-2 border-dashed border-gray-300 ${q.type === 'calc' && printMode === 'exam' ? 'flex flex-col' : ''}`}>
                            <div className="flex gap-2">
                              <span className="font-bold text-xl whitespace-nowrap text-blue-900">
                                {displayId}.
                              </span>
                              <div className="text-lg font-medium leading-relaxed text-gray-800 whitespace-pre-wrap">
                                <MathText content={q.question} />
                              </div>
                            </div>
                            
                            {/* 支援單張或多張圖片顯示 */}
                            {q.imageUrl && (
                              <div className={`${printMode === 'exam' ? 'mt-2 mb-1 print:mt-1' : 'mt-4 mb-2'} pl-6`}>
                                <img src={q.imageUrl} alt="題目附圖" className="w-auto h-auto max-w-[85%] max-h-56 rounded border border-gray-200 shadow-sm print:max-w-[80%] print:max-h-48 print:shadow-none print:border-gray-400" />
                              </div>
                            )}

                            {q.options.length > 0 && (
                              <div className={`${printMode === 'exam' ? 'mt-2 print:mt-1' : 'mt-4'} pl-6 grid ${gridColsClass} ${printMode === 'exam' ? 'gap-y-1 gap-x-4 print:gap-y-0' : 'gap-y-2 gap-x-4'} text-lg`}>
                                {q.options.map((opt, idx) => (
                                  <div key={idx} className="text-gray-700">
                                    <MathText content={opt} />
                                  </div>
                                ))}
                              </div>
                            )}
                            
                            {/* 填充/計算題 留白區塊 (僅在考試模式顯示) */}
                            {q.options.length === 0 && printMode === 'exam' && (
                              <div className={`mt-4 pl-6 flex ${q.type === 'calc' ? 'flex-col flex-grow min-h-[220px]' : 'items-end'}`}>
                                <span className="text-lg font-medium text-gray-700 mr-2 mb-1">答：</span>
                                {q.type !== 'calc' && <div className="border-b-2 border-gray-400 w-48 h-6"></div>}
                              </div>
                            )}
                          </div>

                          {/* 右側：解析區 */}
                          <div className="w-[40%] print:w-[35%] pl-6 relative">
                            <div className={`h-full ${printMode === 'exam' ? 'print:hidden' : ''}`}>
                              <div className="flex items-center gap-2 mb-4 text-blue-800">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                                <span className="font-bold text-xl">深度解析</span>
                                <span className="ml-auto bg-red-100 text-red-700 px-4 py-1.5 rounded-full text-base font-bold shadow-sm whitespace-nowrap overflow-hidden text-ellipsis max-w-[50%]">
                                  解答：<MathText content={q.correctAnswer} />
                                </span>
                              </div>
                              
                              <div className="bg-blue-50/50 p-5 rounded-lg border border-blue-100">
                                <h4 className="font-bold text-lg sm:text-xl text-[#FF0000] mb-3"><MathText content={q.explanation.title} /></h4>
                                <p className="text-gray-700 mb-5 leading-relaxed text-base sm:text-lg bg-yellow-100/50 p-3 rounded whitespace-pre-wrap">
                                  <span className="font-semibold text-amber-700">💡 核心觀念：</span>
                                  <MathText content={q.explanation.coreConcept} />
                                </p>
                                
                                <ul className="space-y-4">
                                  {q.explanation.details.map((detail, idx) => (
                                    <li key={idx} className="text-base sm:text-lg leading-relaxed whitespace-pre-wrap">
                                      {detail.opt && (
                                        <span className={`font-semibold mr-2 ${q.correctAnswer !== "見解析" && q.correctAnswer !== "" && detail.opt.includes(q.correctAnswer.charAt(0)) ? 'text-green-700' : 'text-gray-800'}`}>
                                          <MathText content={detail.opt} />
                                        </span>
                                      )}
                                      <span className="text-gray-600">
                                        <MathText content={detail.desc} />
                                      </span>
                                    </li>
                                  ))}
                                </ul>
                              </div>
                            </div>
                          </div>

                        </div>
                      );

                      if (isFirst) {
                        return (
                          <div key={`wrapper-${typeKey}`} className="print:break-inside-avoid flex flex-col">
                            {/* 題型標題標籤 */}
                            <div className={`flex items-center border-b-2 border-gray-400 pb-2 ${printMode === 'exam' ? 'mb-2 print:mb-1' : 'mb-4'} print:border-gray-800`}>
                              <span className={`bg-[#FF0000] text-white px-4 py-1.5 text-md font-bold rounded-t-lg tracking-widest print:bg-white print:border-2 print:text-[#FF0000] print:border-[#FF0000] print:rounded-md print:px-3`}>
                                📝 {typeTitles[typeKey]} (共 {groupQs.length} 題)
                              </span>
                            </div>
                            {questionContent}
                          </div>
                        );
                      }

                      return questionContent;
                    })}
                  </div>
                );
              })}
            </div>

            {/* 頁尾 */}
            <div className="mt-8 text-center text-gray-400 text-sm print:block">
              - 徹底搞懂每一題，幾何觀念不再卡關 -
            </div>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MistakeNotebook />);
  </script>
</body>
</html>
