<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學學習 App - 總部大廳</title>
    <!-- 引入 Noto Serif TC (明體) 用於標題，Noto Sans TC (黑體) 用於內文 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 國文主題配色：水墨與硃砂 */
            --bg: #f9f7f2;            /* 背景：米白宣紙色 */
            --text-main: #2c2c2c;     /* 主字色：墨黑 */
            --card-bg: #ffffff;
            
            /* 冊別顏色區分 */
            --vol3-color: #00897b;    /* 第3冊：青瓷綠 */
            --vol3-light: #e0f2f1;    /* 第3冊淡色背景 */
            
            --vol4-color: #c62828;    /* 第4冊：朱砂紅 */
            --vol4-light: #ffebee;    /* 第4冊淡色背景 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg);
            /* 加入淡淡的紙張紋理感 */
            background-image: radial-gradient(#e0e0e0 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            max-width: 800px;
        }

        .header h1 {
            font-family: 'Noto Serif TC', serif; /* 標題使用明體 */
            color: var(--text-main);
            font-size: 3em;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .header p {
            color: #5d4037; /* 深褐色文字 */
            font-size: 1.2em;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* 返回按鈕樣式 - 改為紫金漸層，象徵尊貴與智慧 */
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #512da8 0%, #673ab7 100%);
            color: white;
            padding: 12px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(103, 58, 183, 0.3);
            transition: all 0.3s ease;
            border: 2px solid white;
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(103, 58, 183, 0.4);
        }
        
        /* 網格佈局 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        /* 卡片基礎樣式 */
        .app-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            border-top: 6px solid #ccc; /* 預設顏色 */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .app-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        }

        /* 第3冊專屬樣式 */
        .app-card.vol-3 {
            border-top-color: var(--vol3-color);
        }
        .app-card.vol-3 .card-icon {
            background: var(--vol3-light);
            color: var(--vol3-color);
            border-color: #b2dfdb;
        }
        .app-card.vol-3 .card-title {
            color: var(--vol3-color);
        }
        .app-card.vol-3:hover {
            box-shadow: 0 12px 30px rgba(0, 137, 123, 0.15);
        }

        /* 第4冊專屬樣式 */
        .app-card.vol-4 {
            border-top-color: var(--vol4-color);
        }
        .app-card.vol-4 .card-icon {
            background: var(--vol4-light);
            color: var(--vol4-color);
            border-color: #ffcdd2;
        }
        .app-card.vol-4 .card-title {
            color: var(--vol4-color);
        }
        .app-card.vol-4:hover {
            box-shadow: 0 12px 30px rgba(198, 40, 40, 0.15);
        }

        /* 標籤圖示 */
        .card-icon {
            font-size: 2.5em;
            margin-bottom: 15px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
        }

        /* 標題 */
        .card-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.25em;
            font-weight: 900;
            margin-bottom: 8px;
            min-height: 2.5em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 描述文字 (包含檔案名稱) */
        .card-desc {
            font-size: 0.85em;
            color: #757575;
            line-height: 1.4;
            margin-bottom: 15px;
            font-family: monospace; /* 檔案名稱用等寬字體 */
            background: #f5f5f5;
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* 狀態標籤 */
        .card-badge {
            margin-top: auto;
            padding: 5px 12px;
            background: #4caf50; /* 預設開放綠色 */
            color: white;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 補充教材的小標籤樣式調整 */
        .supplementary .card-badge {
            background-color: #795548; /* 棕色 */
        }
        
        /* 準備中/鎖定狀態 */
        .card-locked {
            filter: grayscale(1);
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
            background: #fafafa;
            border-top-color: #9e9e9e !important;
        }
        .card-locked .card-badge {
            background: #9e9e9e;
        }
        .card-locked .card-title {
            color: #616161 !important;
        }
        .card-locked .card-icon {
            background: #eee !important;
            color: #999 !important;
        }

        /* 分隔線 */
        .divider {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            margin: 30px 0 10px 0;
            color: #888;
            font-family: 'Noto Serif TC', serif;
            font-size: 1.2em;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #ddd;
        }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

    </style>
</head>
<body>

    <div class="header">
        <h1>📜 數學學習 App 總部</h1>
        <p>品味文字的奧妙，穿梭古今的科學之旅</p>
        
        <!-- 返回百寶箱按鈕 -->
        <a href="https://nicktsai88.github.io/List/" class="home-btn">
            🎁 返回快樂學習百寶箱
        </a>
    </div>

    <div class="app-grid">
        

        <!-- ================= 第4冊 (朱砂紅) ================= -->

        <div class="divider">第 4 冊</div>

        <!-- 第2段 -->
        <a href="Math4-Chris-2.html" class="app-card vol-4">
            <div class="card-icon">🏃</div>
            <div class="card-title">洋的錯題本</div>
            <div class="card-desc">Math4-Chris-2.html</div>
            <div class="card-badge">開放中</div>
        </a>

        <!-- L2 -->
        <a href="Math4-Louis-2.html" class="app-card vol-4">
            <div class="card-icon">⚔️</div>
            <div class="card-title">澄的錯題本</div>
            <div class="card-desc">Math4-Louis-2.html</div>
            <div class="card-badge">開放中</div>
        </a>

        <!-- L2 -->
        <a href="Math4-Exam4-1.html" class="app-card vol-4">
            <div class="card-icon">⚔️</div>
            <div class="card-title">第2次段考練習</div>
            <div class="card-desc">Math4-Exam4-1.html</div>
            <div class="card-badge">開放中</div>
        </a>

        <!-- L2 -->
        <a href="Math4-Exam4-2.html" class="app-card vol-4">
            <div class="card-icon">⚔️</div>
            <div class="card-title">中垂線與角平分線的性質</div>
            <div class="card-desc">Math4-Exam4-2.html</div>
            <div class="card-badge">開放中</div>
        </a>

    </div>

</body>
</html>
